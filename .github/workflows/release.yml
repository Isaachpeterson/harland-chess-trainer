name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  STOCKFISH_VERSION: "17"

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            stockfish_asset: stockfish-ubuntu-x86-64-avx2.tar
            stockfish_binary: stockfish/stockfish-ubuntu-x86-64-avx2
          - os: macos-latest
            target: macos
            stockfish_asset: stockfish-macos-x86-64-avx2.tar
            stockfish_binary: stockfish/stockfish-macos-x86-64-avx2
          - os: windows-latest
            target: windows
            stockfish_asset: stockfish-windows-x86-64-avx2.zip
            stockfish_binary: stockfish/stockfish-windows-x86-64-avx2.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Download Stockfish (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          curl -L -o stockfish.tar \
            "https://github.com/official-stockfish/Stockfish/releases/download/sf_${{ env.STOCKFISH_VERSION }}/${{ matrix.stockfish_asset }}"
          tar xf stockfish.tar
          cp "${{ matrix.stockfish_binary }}" resources/stockfish/stockfish
          chmod +x resources/stockfish/stockfish

      - name: Download Stockfish (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/official-stockfish/Stockfish/releases/download/sf_${{ env.STOCKFISH_VERSION }}/${{ matrix.stockfish_asset }}" -OutFile stockfish.zip
          Expand-Archive -Path stockfish.zip -DestinationPath .
          Copy-Item "${{ matrix.stockfish_binary }}" "resources/stockfish/stockfish.exe"

      - name: Install frontend dependencies
        working-directory: app/src-ui
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: app
          tagName: ${{ github.ref_name }}
          releaseName: "Harland Chess Trainer ${{ github.ref_name }}"
          releaseBody: "See CHANGELOG.md for details."
          releaseDraft: true
          prerelease: false
